name: Build Desktop (multi-OS)

# Builds the AXIOM desktop app (Tauri) for macOS, Windows, and Linux.
# Tauri apps cannot be cross-compiled from one host — each OS needs a native
# runner. This matrix produces a .dmg (mac), .exe/NSIS installer (Windows), and
# .deb + .AppImage (Linux), and attaches them to the release for the pushed tag.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release the desktop builds under (e.g. desktop-v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Linux needs the WebKitGTK + build deps for Tauri.
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: axiom/packages/desktop/src-tauri

      - name: Install workspace dependencies
        working-directory: axiom
        run: npm ci || npm install

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: axiom/packages/desktop
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "AXIOM Desktop ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          releaseBody: "AXIOM desktop builds for macOS, Windows, and Linux."
